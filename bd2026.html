<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>生日快樂</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.3.2"></script>
    <link rel="icon" type="image/png" href="imagesbd/favicon.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #9575CD 0%, #7E57C2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 15px 50px rgba(0,0,0,0.3);
            max-width: 600px;
            width: 100%;
            text-align: center;
        }

        h1 {
            color: #FF7043;
            margin-bottom: 10px;
            font-size: 2.5em;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 1.2em;
        }

        .buttons {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 30px;
        }

        .btn {
            display: inline-block;
            padding: 15px 30px;
            font-size: 1.1em;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            text-decoration: none;
            font-weight: bold;
            transition: all 0.3s ease;
            width: 100%;
            box-sizing: border-box;
        }

        .btn-game {
            background: linear-gradient(135deg, #9575CD 0%, #7E57C2 100%);
            color: white;
        }

        .btn-game:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(149, 117, 205, 0.4);
        }

        .btn-message {
            background: linear-gradient(135deg, #FF7043 0%, #F4511E 100%);
            color: white;
        }

        .btn-message:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(255, 112, 67, 0.4);
        }

        .decorations {
            font-size: 2.5em;
            margin: 20px 0;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>HAPPY BIRTHDAY MOM!!!</h1>
        <h1>生日快樂 媽媽!!!</h1>
        <p class="subtitle">我愛你 I LOVE YOU 💖💖💖</p>
        
        <div class="decorations">
            🎈 🎉 🎁 🎉 🎈
        </div>

        <div class="buttons">
            <a href="game.html" class="btn btn-game">玩生日遊戲
            </a>
            <a href="message.html" class="btn btn-message">一段話</a>
        </div>
    </div>

    <script>
        function launchConfetti() {
            var duration = 2 * 1000;
            var end = Date.now() + duration;

            (function frame() {
                confetti({
                    particleCount: 5,
                    angle: 60,
                    spread: 55,
                    origin: { x: 0 }
                });

                confetti({
                    particleCount: 5,
                    angle: 120,
                    spread: 55,
                    origin: { x: 1 }
                });

                if (Date.now() < end) {
                    requestAnimationFrame(frame);
                }
            })();
        }
        window.onload = launchConfetti;
    </script>
</body>

</html>
