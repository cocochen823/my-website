<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/png" href="imagesbd/favicon.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>媽媽的生日遊戲 🎂</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .game-container {
            text-align: center;
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            max-width: 900px;
            width: 100%;
        }

        h1 {
            color: #FF7043;
            margin-bottom: 10px;
            font-size: 2.5em;
        }

        .subtitle {
            color: #666;
            margin-bottom: 20px;
            font-size: 1.1em;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .stat-box {
            background: #f0f0f0;
            padding: 15px 25px;
            border-radius: 8px;
            font-size: 1.2em;
            font-weight: bold;
            min-width: 150px;
        }

        .stat-box.lives {
            color: #e74c3c;
        }

        .stat-box.score {
            color: #27ae60;
        }

        #gameCanvas {
            border: 4px solid #333;
            background-color: #9575CD;
            margin: 20px 0;
            display: block;
            border-radius: 8px;
            max-width: 100%;
            height: auto;
        }

        .controls {
            margin: 20px 0;
            font-size: 1.1em;
            color: #333;
        }

        .controls p {
            margin: 10px 0;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 20px;
        }

        button {
            padding: 12px 30px;
            font-size: 1em;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
        }

        .btn-start {
            background: #27ae60;
            color: white;
        }

        .btn-start:hover {
            background: #229954;
            transform: scale(1.05);
        }

        .btn-menu {
            background: #3498db;
            color: white;
        }

        .btn-menu:hover {
            background: #2980b9;
            transform: scale(1.05);
        }

        .game-over {
            font-size: 2em;
            font-weight: bold;
            margin: 20px 0;
            padding: 20px;
            border-radius: 8px;
        }

        .game-over.lose {
            background: #ffe6e6;
            color: #c0392b;
        }

        .game-over.win {
            background: #e6ffe6;
            color: #27ae60;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.8em;
            }

            #gameCanvas {
                max-width: 100%;
            }

            .game-container {
                padding: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>🎂 媽媽的生日遊戲 🎂</h1>
        <p class="subtitle">幫你自己捕捉禮物並避開不好的東西！</p>

        <div class="stats">
            <div class="stat-box score">
                分數: <span id="score">0</span> / 100
            </div>
            <div class="stat-box lives">
                生命: <span id="lives">3</span>
            </div>
        </div>

        <canvas id="gameCanvas" width="800" height="600"></canvas>

        <div class="controls">
            <p id="gameStatus"></p>
        </div>

        <div class="btn-group">
            <button class="btn-start" onclick="startGame()">開始遊戲</button>
            <button class="btn-menu" onclick="location.href='bd2026.html'">回主頁</button>
        </div>
    </div>

    <script>
        // Canvas setup
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Game variables
        const GAME_WIDTH = 800;
        const GAME_HEIGHT = 600;
        let gameRunning = false;
        let gameOver = false;
        let win = false;

        // Images
        const images = {
            player: new Image(),
            goodItems: [],
            badItems: []
        };

        // Load images
        images.player.src = 'image2026/Screenshot 2026-03-25 200822.png';

        // Good items (gifts) - using only specific screenshots from image2026
        const goodItemPaths = [
            'image2026/Screenshot 2026-03-25 202821.png',
            'image2026/Screenshot 2026-03-25 203243.png',
            'image2026/Screenshot 2026-03-25 203252.png',
            'image2026/Screenshot 2026-03-25 203329.png',
            'image2026/Screenshot 2026-03-25 203337.png',
            'image2026/Screenshot 2026-03-25 203344.png',
            'image2026/Screenshot 2026-03-25 203352.png',
            'image2026/Screenshot 2026-03-25 203403.png',
            'image2026/Screenshot 2026-03-25 203439.png'
        ];

        // Bad items - emojis
        const badItemEmojis = ['🧹', '💼', '🧽', '🍳', '🧴', '💼', '📋', '🧴'];

        goodItemPaths.forEach(path => {
            const img = new Image();
            img.src = path;
            images.goodItems.push(img);
        });

        // Player (Mom)
        const player = {
            x: 350,
            y: 480,
            width: 100,
            height: 100,
            speed: 18,
            dx: 0
        };

        // Game state
        let score = 0;
        let lives = 3;
        let items = [];
        let tickCount = 0;

        // Keyboard controls
        const keys = {
            ArrowLeft: false,
            ArrowRight: false
        };

        window.addEventListener('keydown', (e) => {
            if (e.key in keys) {
                keys[e.key] = true;
                e.preventDefault();
            }
        });

        window.addEventListener('keyup', (e) => {
            if (e.key in keys) {
                keys[e.key] = false;
                e.preventDefault();
            }
        });

        // FallingItem class
        class FallingItem {
            constructor() {
                this.x = Math.random() * (GAME_WIDTH - 80);
                this.y = -80;
                this.width = 80;
                this.height = 80;
                this.speed = 4 + Math.random() * 2;
                this.isGood = Math.random() < 0.7; // 70% good, 30% bad
                
                // Select random image for good items or emoji for bad items
                if (this.isGood) {
                    this.image = images.goodItems[Math.floor(Math.random() * images.goodItems.length)];
                } else {
                    this.emoji = badItemEmojis[Math.floor(Math.random() * badItemEmojis.length)];
                }
            }

            update() {
                this.y += this.speed;
            }

            draw(ctx) {
                if (this.isGood && this.image && this.image.complete) {
                    // Draw good item image
                    ctx.drawImage(this.image, this.x, this.y, this.width, this.height);
                    
                    // Add border
                    ctx.strokeStyle = '#27ae60';
                    ctx.lineWidth = 2;
                    ctx.strokeRect(this.x, this.y, this.width, this.height);
                } else if (this.isGood) {
                    // Fallback for loading images: colored square
                    ctx.fillStyle = '#27ae60';
                    ctx.fillRect(this.x, this.y, this.width, this.height);
                } else {
                    // Bad item: draw emoji with background
                    ctx.fillStyle = '#fff3cd';
                    ctx.fillRect(this.x, this.y, this.width, this.height);
                    ctx.strokeStyle = '#ffc107';
                    ctx.lineWidth = 2;
                    ctx.strokeRect(this.x, this.y, this.width, this.height);
                    ctx.fillStyle = '#000';
                    ctx.font = 'bold 50px Arial';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(this.emoji, this.x + 40, this.y + 40);
                }
            }

            isOffScreen() {
                return this.y > GAME_HEIGHT;
            }
        }

        function drawPlayer() {
            // Draw actual player image
            if (images.player && images.player.complete) {
                ctx.drawImage(images.player, player.x, player.y, player.width, player.height);
                // Add border
                ctx.strokeStyle = '#FF7043';
                ctx.lineWidth = 3;
                ctx.strokeRect(player.x, player.y, player.width, player.height);
            } else {
                // Fallback: orange square with emoji
                ctx.fillStyle = '#FF7043';
                ctx.fillRect(player.x, player.y, player.width, player.height);
                ctx.font = 'bold 50px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('👩', player.x + player.width / 2, player.y + player.height / 2);
                ctx.strokeStyle = '#D84315';
                ctx.lineWidth = 2;
                ctx.strokeRect(player.x, player.y, player.width, player.height);
            }
        }

        function updatePlayer() {
            if (keys['ArrowLeft'] && player.x > 0) {
                player.x -= player.speed;
            }
            if (keys['ArrowRight'] && player.x + player.width < GAME_WIDTH) {
                player.x += player.speed;
            }
        }

        function spawnItems() {
            tickCount++;
            if (tickCount > 30) {
                items.push(new FallingItem());
                tickCount = 0;
            }
        }

        function updateItems() {
            for (let i = items.length - 1; i >= 0; i--) {
                items[i].update();

                // Check collision with player
                if (checkCollision(player, items[i])) {
                    if (items[i].isGood) {
                        score += 10;
                    } else {
                        lives -= 1;
                    }
                    items.splice(i, 1);
                } else if (items[i].isOffScreen()) {
                    items.splice(i, 1);
                }
            }
        }

        function checkCollision(player, item) {
            return (
                player.x < item.x + item.width &&
                player.x + player.width > item.x &&
                player.y < item.y + item.height &&
                player.y + player.height > item.y
            );
        }

        function draw() {
            // Clear canvas with purple background
            ctx.fillStyle = '#9575CD';
            ctx.fillRect(0, 0, GAME_WIDTH, GAME_HEIGHT);

            // Draw decorations at top
            ctx.fillStyle = '#fff';
            ctx.font = '30px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('🎈 🎈 🎈 🎈 🎈', GAME_WIDTH / 2, 30);

            // Draw items
            items.forEach(item => item.draw(ctx));

            // Draw player
            drawPlayer();

            // Draw UI on canvas
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 20px Arial';
            ctx.textAlign = 'left';
            ctx.textBaseline = 'top';
            ctx.shadowColor = 'rgba(0,0,0,0.5)';
            ctx.shadowBlur = 4;
            ctx.fillText(`分數: ${score}`, 10, 10);
            ctx.fillText(`生命: ${lives}`, 10, 40);
            ctx.shadowColor = 'transparent';
        }

        function gameLoop() {
            if (lives <= 0) {
                gameOver = true;
                gameRunning = false;
                document.getElementById('gameStatus').innerHTML = 
                    '<div class="game-over lose">💔 遊戲結束！你輸了，但沒關係，我還是愛你！</div>';
            } else if (score >= 100) {
                win = true;
                gameRunning = false;
                document.getElementById('gameStatus').innerHTML = 
                    '<div class="game-over win">🎉 你贏了！我愛你！</div>';
            }

            if (gameRunning) {
                updatePlayer();
                updateItems();
                spawnItems();
                draw();
                document.getElementById('score').textContent = score;
                document.getElementById('lives').textContent = lives;
            } else {
                draw();
            }

            requestAnimationFrame(gameLoop);
        }

        function startGame() {
            gameRunning = true;
            gameOver = false;
            win = false;
            score = 0;
            lives = 3;
            items = [];
            tickCount = 0;
            
            player.x = 350;
            player.y = 480;

            document.getElementById('gameStatus').innerHTML = '';
            document.getElementById('score').textContent = score;
            document.getElementById('lives').textContent = lives;

            gameLoop();
        }

        // Draw initial screen
        draw();
        ctx.fillStyle = 'rgba(0,0,0,0.6)';
        ctx.fillRect(0, 0, GAME_WIDTH, GAME_HEIGHT);
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 40px Arial';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('點擊「開始遊戲」來玩！', GAME_WIDTH / 2, GAME_HEIGHT / 2);
    </script>
</body>
</html>
